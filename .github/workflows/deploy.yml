name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH for deploy host
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SSH_PRIVATE_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_host_key
          chmod 600 ~/.ssh/deploy_host_key

          eval "$(ssh-agent -s)"

          if [ -n "${SSH_PRIVATE_KEY_PASSPHRASE:-}" ]; then
            cat > ~/.ssh/askpass.sh <<'EOF'
          #!/usr/bin/env bash
          printf '%s\n' "$SSH_PRIVATE_KEY_PASSPHRASE"
          EOF
            chmod 700 ~/.ssh/askpass.sh
            DISPLAY=:0 SSH_ASKPASS=~/.ssh/askpass.sh SSH_ASKPASS_REQUIRE=force ssh-add ~/.ssh/deploy_host_key < /dev/null
          else
            ssh-add ~/.ssh/deploy_host_key
          fi

          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<EOF
          Host deploy-host
            HostName $SSH_HOST
            Port ${SSH_PORT:-22}
            User $SSH_USER
            IdentityAgent $SSH_AUTH_SOCK
            StrictHostKeyChecking yes
          EOF

      - name: Deploy Laravel app
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH || github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          ssh deploy-host "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_BRANCH='$DEPLOY_BRANCH' GITHUB_REPOSITORY='$GITHUB_REPOSITORY' bash -s" <<'EOF'
          set -euo pipefail

          cd "$DEPLOY_PATH"
          trap 'php artisan up || true' EXIT

          php artisan down || true

          git remote set-url origin "git@github.com:${GITHUB_REPOSITORY}.git"
          git fetch origin "$DEPLOY_BRANCH"
          git checkout "$DEPLOY_BRANCH"
          git pull --ff-only origin "$DEPLOY_BRANCH"

          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

          php artisan up
          trap - EXIT
          EOF
