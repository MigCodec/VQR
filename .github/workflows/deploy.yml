name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH for deploy host
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SSH_PRIVATE_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_host_key
          chmod 600 ~/.ssh/deploy_host_key

          eval "$(ssh-agent -s)"

          if [ -n "${SSH_PRIVATE_KEY_PASSPHRASE:-}" ]; then
            cat > ~/.ssh/askpass.sh <<'EOF'
          #!/usr/bin/env bash
          printf '%s\n' "$SSH_PRIVATE_KEY_PASSPHRASE"
          EOF
            chmod 700 ~/.ssh/askpass.sh
            DISPLAY=:0 SSH_ASKPASS=~/.ssh/askpass.sh SSH_ASKPASS_REQUIRE=force ssh-add ~/.ssh/deploy_host_key < /dev/null
          else
            ssh-add ~/.ssh/deploy_host_key
          fi

          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<EOF
          Host deploy-host
            HostName $SSH_HOST
            Port ${SSH_PORT:-22}
            User $SSH_USER
            IdentityAgent $SSH_AUTH_SOCK
            StrictHostKeyChecking yes
          EOF

      - name: Deploy Laravel app
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH || github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REPOSITORY_TOKEN: ${{ secrets.REPOSITORY_TOKEN }}
          COMPOSER_BIN: ${{ secrets.COMPOSER_BIN }}
        run: |
          set -euo pipefail

          ssh deploy-host "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_BRANCH='$DEPLOY_BRANCH' GITHUB_REPOSITORY='$GITHUB_REPOSITORY' REPOSITORY_TOKEN='$REPOSITORY_TOKEN' COMPOSER_BIN='${COMPOSER_BIN:-composer}' bash -s" <<'EOF'
          set -euo pipefail

          if [ -n "${REPOSITORY_TOKEN:-}" ]; then
            REPOSITORY_URL="https://x-access-token:${REPOSITORY_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          else
            REPOSITORY_URL="git@github.com:${GITHUB_REPOSITORY}.git"
          fi

          mkdir -p "$DEPLOY_PATH"

          if [ ! -d "$DEPLOY_PATH/.git" ]; then
            if [ -n "$(find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 -print -quit)" ]; then
              echo "DEPLOY_PATH exists but is not a git repository: $DEPLOY_PATH"
              echo "Set DEPLOY_PATH to the Laravel project root, or use an empty folder for the first clone."
              exit 1
            fi

            git clone --branch "$DEPLOY_BRANCH" "$REPOSITORY_URL" "$DEPLOY_PATH"
          fi

          cd "$DEPLOY_PATH"

          if [ ! -f artisan ]; then
            echo "artisan was not found in $DEPLOY_PATH"
            echo "DEPLOY_PATH must point to the Laravel project root."
            exit 1
          fi

          trap 'php artisan up || true' EXIT

          php artisan down || true

          git remote set-url origin "$REPOSITORY_URL"
          git fetch origin "$DEPLOY_BRANCH"
          git checkout "$DEPLOY_BRANCH"
          git pull --ff-only origin "$DEPLOY_BRANCH"
          git remote set-url origin "git@github.com:${GITHUB_REPOSITORY}.git"

          echo "Using Composer command: $COMPOSER_BIN"
          eval "$COMPOSER_BIN install --no-dev --no-interaction --prefer-dist --optimize-autoloader"

          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

          php artisan up
          trap - EXIT
          EOF
